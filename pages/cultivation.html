<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriPlanner - Trồng trọt</title>
    <meta name="description" content="Quản lý mô phỏng đất canh tác với bản đồ Leaflet">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <!-- Styles -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/cultivation.css">
    <link rel="stylesheet" href="../css/pages/pest-analysis.css">
    <link rel="stylesheet" href="../css/pages/financial-analysis.css">
    <link rel="stylesheet" href="../css/pages/data-export.css">

    <link rel="stylesheet" href="../css/pages/inventory.css">
    <link rel="stylesheet" href="../css/pages/weather-logs.css">
    <link rel="stylesheet" href="../css/pages/traceability.css">
    <link rel="stylesheet" href="../css/chatbot.css">
    <link rel="stylesheet" href="../css/smart-advisor.css">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- ApexCharts -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <!-- Chart.js and Adapter for Financial Analysis -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <style>
        #leaflet-map {
            width: 100%;
            height: 100%;
            min-height: 500px;
            z-index: 1;
        }

        /* Prevent double scrollbars */
        body {
            overflow: hidden;
        }

        .cultivation-layout {
            height: calc(100vh - 64px);
            /* Adjust based on header height */
            overflow: hidden;
        }

        /* Location Search */
        .location-search {
            position: absolute;
            top: var(--spacing-4);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: var(--spacing-2);
            background: white;
            padding: var(--spacing-2);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 400px;
        }

        /* Field Timers & Revenue */
        .sensor-sidebar {
            width: 320px;
            background: white;
            border-left: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow-y: auto;
            /* Enable scrolling */
            height: 100%;
            /* Ensure full height */
        }

        .feature-panel {
            position: fixed !important;
            /* Ensure it floats above */
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            z-index: 9999 !important;
            /* Extremely high z-index */
            max-height: 85vh;
            overflow-y: auto;
        }

        .field-timer,
        .field-revenue {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #4b5563;
        }

        .timer-icon {
            font-size: 18px;
        }

        .timer-icon--blue {
            color: #3b82f6;
        }

        .timer-icon--green {
            color: #10b981;
        }

        .timer-icon--red {
            color: #ef4444;
        }

        .timer-icon--amber {
            color: #f59e0b;
        }

        .timer-icon--emerald {
            color: #059669;
        }

        /* Workflow Steps */
        .workflow-step {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--color-primary);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            font-weight: bold;
        }

        .field-action-btn:disabled .workflow-step {
            background: #9ca3af;
        }

        /* Danger Button */
        .field-action-btn--danger {
            background-color: #fee2e2 !important;
            color: #ef4444 !important;
            border: 1px solid #fecaca !important;
        }

        .field-action-btn--danger:hover:not(:disabled) {
            background-color: #fecaca !important;
        }

        /* List Items in Modals */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .list-item:hover {
            border-color: var(--color-primary);
            background: #f0fdf4;
        }

        .list-item.selected {
            border-color: var(--color-primary);
            background: #dcfce7;
        }

        .list-item__info h4 {
            margin: 0 0 4px 0;
            font-size: 14px;
        }

        .list-item__info p {
            margin: 0;
            font-size: 12px;
            color: #6b7280;
        }

        .list-item__price {
            font-weight: bold;
            color: var(--color-primary);
            font-size: 13px;
        }

        .location-search__input {
            flex: 1;
            padding: var(--spacing-2) var(--spacing-3);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-sm);
        }

        .location-search__btn {
            padding: var(--spacing-2) var(--spacing-3);
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: var(--font-size-sm);
            transition: background var(--transition-fast);
        }

        .location-search__btn:hover {
            background: var(--color-primary-dark);
        }

        .location-search__btn .material-symbols-outlined {
            font-size: 18px;
        }

        /* Compact Weather Widget */
        .weather-widget {
            position: absolute;
            top: 70px;
            right: var(--spacing-4);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            min-width: 200px;
            max-width: 240px;
            overflow: hidden;
        }

        .weather-widget__header {
            padding: var(--spacing-2) var(--spacing-3);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            font-size: var(--font-size-sm);
        }

        .weather-widget__location {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: var(--font-weight-semibold);
        }

        .weather-widget__location .material-symbols-outlined {
            font-size: 16px;
        }

        .weather-widget__body {
            padding: var(--spacing-3);
        }

        .weather-widget__current {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
        }

        .weather-widget__icon {
            width: 48px;
            height: 48px;
        }

        .weather-widget__temp {
            font-size: 28px;
            font-weight: var(--font-weight-bold);
        }

        .weather-widget__desc {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }

        .weather-widget__details {
            display: flex;
            gap: var(--spacing-2);
            margin-top: var(--spacing-2);
            padding-top: var(--spacing-2);
            border-top: 1px solid var(--color-border-light);
        }

        .weather-detail {
            flex: 1;
            text-align: center;
        }

        .weather-detail__label {
            font-size: 9px;
            color: var(--color-text-muted);
        }

        .weather-detail__value {
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-semibold);
        }

        .weather-loading {
            text-align: center;
            padding: var(--spacing-4);
        }

        /* Forecast Modal */
        .forecast-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .forecast-modal.open {
            display: flex;
        }

        .forecast-modal__content {
            background: white;
            border-radius: var(--radius-2xl);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .forecast-modal__header {
            padding: var(--spacing-4) var(--spacing-5);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .forecast-modal__title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
        }

        .forecast-modal__close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: var(--radius-full);
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forecast-modal__close .material-symbols-outlined {
            color: white;
            font-size: 20px;
        }

        .forecast-modal__body {
            padding: var(--spacing-4);
        }

        .forecast-tabs {
            display: flex;
            gap: var(--spacing-2);
            margin-bottom: var(--spacing-4);
        }

        .forecast-tab {
            flex: 1;
            padding: var(--spacing-2);
            background: #f1f5f9;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .forecast-tab:hover {
            background: #e2e8f0;
        }

        .forecast-tab.active {
            background: var(--color-primary);
            color: white;
        }

        .forecast-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-2);
            max-height: 350px;
            overflow-y: auto;
        }

        .forecast-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-3);
            padding: var(--spacing-3);
            background: #f8fafc;
            border-radius: var(--radius-lg);
        }

        .forecast-item__date {
            flex: 1;
            font-weight: var(--font-weight-medium);
        }

        .forecast-item__icon {
            width: 40px;
            height: 40px;
        }

        .forecast-item__temp {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
        }

        .forecast-item__desc {
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
            width: 100px;
            text-align: right;
        }

        /* Map Controls */
        .map-controls {
            position: absolute;
            top: 70px;
            left: var(--spacing-4);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-2);
            z-index: 1000;
        }

        .map-control-btn {
            width: 36px;
            height: 36px;
            background: white;
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }

        .map-control-btn:hover {
            background: #f8fafc;
            box-shadow: var(--shadow-md);
        }

        .map-control-btn .material-symbols-outlined {
            font-size: 20px;
            color: var(--color-text-secondary);
        }

        /* Layer buttons */
        .map-layers {
            position: absolute;
            bottom: 40px;
            /* Increased to avoid Leaflet attribution overlap */
            left: var(--spacing-4);
            right: auto;
            display: flex;
            gap: var(--spacing-1);
            z-index: 1000;
        }

        .map-layer-btn {
            padding: var(--spacing-2) var(--spacing-3);
            background: white;
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
            font-size: var(--font-size-xs);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .map-layer-btn:hover {
            background: #f8fafc;
        }

        .map-layer-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .map-layer-btn--planning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border-color: #d97706;
        }

        .map-layer-btn--planning:hover {
            background: linear-gradient(135deg, #d97706, #b45309);
        }

        .map-layer-btn--planning.active {
            background: linear-gradient(135deg, #059669, #047857);
            border-color: #047857;
            box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.3);
        }

        /* Soil Map Button */
        .map-layer-btn--soil {
            background: linear-gradient(135deg, #92400e, #b45309);
            color: white;
            border-color: #92400e;
        }

        .map-layer-btn--soil:hover {
            background: linear-gradient(135deg, #78350f, #92400e);
        }

        .map-layer-btn--soil.active {
            background: linear-gradient(135deg, #d97706, #f59e0b);
            border-color: #d97706;
            box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.3);
        }

        .map-layer-btn--suitability {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            border-color: #7c3aed;
        }

        .map-layer-btn--suitability:hover {
            background: linear-gradient(135deg, #6d28d9, #5b21b6);
        }

        .map-layer-btn--suitability.active {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
        }

        /* Soil Legend specific styles */
        .soil-legend .planning-legend__header {
            background: linear-gradient(135deg, #92400e 0%, #d97706 100%) !important;
        }

        /* Planning Source Card Featured */
        .planning-source-card--featured {
            border: 2px solid #059669 !important;
            background: linear-gradient(to right, #ecfdf5, #f0fdf4) !important;
            box-shadow: 0 4px 15px rgba(5, 150, 105, 0.2) !important;
        }

        .planning-source-card--featured:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(5, 150, 105, 0.3) !important;
        }

        .planning-source-card--featured .planning-source-info h5 {
            color: #047857 !important;
            font-size: 15px !important;
        }

        /* Planning Sync Bar */
        .planning-sync-bar {
            position: absolute;
            top: var(--spacing-4);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: linear-gradient(135deg, #059669, #047857);
            padding: 10px 16px;
            border-radius: var(--radius-xl);
            box-shadow: 0 4px 20px rgba(5, 150, 105, 0.4);
            color: white;
            min-width: 500px;
            max-width: 700px;
        }

        .planning-sync-bar__info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .planning-sync-bar__info .material-symbols-outlined {
            font-size: 18px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .planning-sync-bar__actions {
            display: flex;
            gap: 8px;
        }

        .planning-sync-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-md);
            color: white;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .planning-sync-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .planning-sync-btn .material-symbols-outlined {
            font-size: 16px;
        }

        .planning-sync-btn--secondary {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .planning-sync-btn--primary {
            background: rgba(255, 255, 255, 0.95);
            color: #059669;
            border-color: white;
            font-weight: 600;
        }

        .planning-sync-btn--primary:hover {
            background: white;
            transform: scale(1.02);
        }

        .planning-sync-btn--close {
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.5);
            padding: 6px 8px;
        }

        .planning-sync-btn--close:hover {
            background: rgba(239, 68, 68, 0.5);
        }

        /* Planning Legend */
        .planning-legend {
            position: absolute;
            bottom: var(--spacing-6);
            right: var(--spacing-4);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: 2px solid #f59e0b;
            padding: var(--spacing-3);
            min-width: 200px;
            z-index: 1000;
        }

        .planning-legend__header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #d97706;
            margin-bottom: var(--spacing-2);
            padding-bottom: var(--spacing-2);
            border-bottom: 1px solid #fcd34d;
        }

        .planning-legend__header .material-symbols-outlined {
            font-size: 18px;
        }

        .planning-legend__items {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: var(--spacing-3);
        }

        .planning-legend__item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #4b5563;
        }

        .planning-legend__dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .planning-legend__actions {
            display: flex;
            gap: 8px;
            padding-top: var(--spacing-2);
            border-top: 1px solid #e5e7eb;
        }

        .planning-legend__actions .btn {
            flex: 1;
            font-size: 11px;
            padding: 6px 8px;
        }

        /* Planning Zone Tooltip */
        .planning-zone-tooltip {
            background: rgba(245, 158, 11, 0.95) !important;
            border: none !important;
            color: white !important;
            font-weight: 500;
            padding: 4px 10px !important;
            border-radius: 6px !important;
        }

        .planning-zone-tooltip::before {
            border-top-color: rgba(245, 158, 11, 0.95) !important;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .spinning {
            animation: spin 1s linear infinite;
        }

        /* Disabled button styles */
        .field-action-btn--disabled {
            opacity: 0.5;
            cursor: not-allowed !important;
            pointer-events: none;
        }

        .field-action-btn--disabled:hover {
            transform: none !important;
            box-shadow: none !important;
        }

        .field-action-btn__icon--green {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .field-action-btn__icon--amber {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .field-action-btn__icon--red {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .field-action-btn__icon--yellow {
            background: rgba(234, 179, 8, 0.1);
            color: #eab308;
        }

        /* Modal styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        .modal.open {
            display: flex;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e5e7eb;
        }

        .modal-header h3 {
            margin: 0 0 4px;
            font-size: 18px;
            font-weight: 600;
        }

        .modal-header p {
            margin: 0;
            color: #6b7280;
            font-size: 14px;
        }

        .modal-body {
            padding: 20px 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Crop grid */
        .crop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .crop-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
